# ======================== DEV 环境配置 ========================
# 【注意】
# 本地开发默认 profile=dev，不暴露线程池实验入口。
# RabbitMQ 的 /flashmall-dev vhost 需要提前创建（仓库内不自动创建 vhost）。

spring:
  datasource:
    # 【本轮改动】dev 使用独立库，避免和 perf 混用数据
    url: jdbc:mysql://localhost:3306/demo_dev?useSSL=false&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 【缓存链路第 2 环】Redis 连接参数
  data:
    redis:
      host: localhost
      port: 6379
      # 【本轮改动】dev 默认用 0 号库
      database: 0

  cache:
    type: redis

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    # 【本轮改动】dev 使用独立 vhost，降低和 perf 的消息串扰风险
    virtual-host: /flashmall-dev

    template:
      default-receive-queue: order.create.queue.dev

    # 【关键新增】Publisher Confirm
    publisher-confirm-type: correlated

    # 【关键新增】Publisher Returns
    publisher-returns: true

    # 【关键新增】消费者手动 ACK
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1
        retry:
          enabled: true
          initial-interval: 1000
          max-interval: 10000
          multiplier: 2.0
          max-attempts: 3

# ======================== 业务侧资源命名空间（dev） ========================
app:
  redis:
    # 【本轮改动】Spring Cache key 前缀（只影响缓存注解相关 key）
    cache-key-prefix: flashmall:dev
  mq:
    order:
      exchange-name: order.exchange.dev
      queue-name: order.create.queue.dev
      routing-key: order.create.dev
