# ======================== DEV 环境配置 ========================
# 【注意】
# 本地开发默认 profile=dev，不暴露线程池实验入口。
#
# 【本轮改动】
# dev 资源与 perf 资源开始做“第二层隔离”：
# - MySQL：demo_dev
# - Redis：database=1
# - RabbitMQ：/flashmall-dev + dev 专属 exchange/queue/routing-key

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/demo_dev?useSSL=false&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 【缓存链路第 2 环】Redis 连接参数
  data:
    redis:
      host: localhost
      port: 6379
      database: 1

  cache:
    type: redis

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /flashmall-dev

    template:
      default-receive-queue: order.create.queue.dev

    # 【关键新增】Publisher Confirm
    publisher-confirm-type: correlated

    # 【关键新增】Publisher Returns
    publisher-returns: true

    # 【关键新增】消费者手动 ACK
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1
        retry:
          enabled: true
          initial-interval: 1000
          max-interval: 10000
          multiplier: 2.0
          max-attempts: 3

# 【本轮改动】订单消息通道命名
#
# 说明：
# - 你即使还没来得及创建独立 RabbitMQ vhost，
#   也可以通过这里的命名空间先避免 dev/perf 队列互相消费。
# - 当 vhost 和命名空间都开启时，隔离更稳。
app:
  mq:
    order:
      exchange: order.exchange.dev
      queue: order.create.queue.dev
      routing-key: order.create.dev
