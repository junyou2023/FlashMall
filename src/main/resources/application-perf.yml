# ======================== PERF 压测环境配置 ========================
# 【本轮改动】
# - 显式隔离 perf profile，用于线程池实验入口与压测脚本联调
# - 业务主链路配置保持与 dev 同构，避免“测的是另一套系统”

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/demo?useSSL=false&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

    template:
      default-receive-queue: order.create.queue

    publisher-confirm-type: correlated
    publisher-returns: true

    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1
        retry:
          enabled: true
          initial-interval: 1000
          max-interval: 10000
          multiplier: 2.0
          max-attempts: 3

logging:
  level:
    com.example.demo.lab: INFO
