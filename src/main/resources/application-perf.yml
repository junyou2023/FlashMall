# ======================== PERF 压测环境配置 ========================
# 【本轮改动】
# - 显式隔离 perf profile，用于线程池实验入口与压测脚本联调
# - 业务主链路配置保持与 dev 同构，避免“测的是另一套系统”
# - 进一步做第二层资源隔离（MySQL / Redis / RabbitMQ）

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/demo_perf?useSSL=false&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      database: 2

  cache:
    type: redis

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /flashmall-perf

    template:
      default-receive-queue: order.create.queue.perf

    publisher-confirm-type: correlated
    publisher-returns: true

    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1
        retry:
          enabled: true
          initial-interval: 1000
          max-interval: 10000
          multiplier: 2.0
          max-attempts: 3

# 【本轮改动】
# perf 使用独立交换机/队列/routing-key，
# 配合 /flashmall-perf vhost，避免实验消息与 dev/prod 主链路串流。
app:
  mq:
    order:
      exchange: order.exchange.perf
      queue: order.create.queue.perf
      routing-key: order.create.perf
    consumer:
      concurrency: 4
      max-concurrency: 12
      prefetch: 50

logging:
  level:
    com.example.demo.lab: INFO
