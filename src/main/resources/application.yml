# ======================== 全局基础配置（所有环境共享） ========================
spring:
  profiles:
    # 【本轮改动】默认走 dev，保证本地开发保持原体验。
    default: dev

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.demo.model

# ======================== 缓存异步线程池配置（共享基础设施） ========================
# 【为什么改】
# cacheTaskExecutor 现在不仅被实验入口使用，也被真实业务里的延迟双删使用，
# 所以仍然放在公共配置里，避免被误当成纯实验脏代码。
app:
  async:
    cache:
      core-pool-size: 2
      max-pool-size: 4
      queue-capacity: 50
      keep-alive-seconds: 60
      thread-name-prefix: cache-delete-
